version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Set Node version and install dependencies
        - nvm use 18
        - npm ci
    build:
      commands:
        # Build the Vite + React TypeScript app
        - npm run build
  artifacts:
    # Output directory for Vite build
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
